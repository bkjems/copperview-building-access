<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copperview Stake - Temporary Building Access</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="light">
  <div class="header">
    <h2><span id="stakeName"></span><br><span class="header-subtitle">Temporary Building Access</span></h2>
    <button type="button" id="modeToggle" onclick="toggleMode()" aria-label="Toggle light and dark mode">&#9789;</button>
  </div>
  <form id="licenseForm">
    <label for="ward">Ward</label>
    <select id="ward" name="ward" required onchange="autoSelectBuilding(this.value)">
      <option value="">-- Select Ward --</option>
    </select>

    <label for="building">Building</label>
    <select id="building" name="building" required>
      <option value="">-- Select Building --</option>
    </select>

    <label for="request">Request</label>
    <select id="request" name="request" required>
      <option value="">-- Select Request --</option>
      <option value="building_access">Building Access</option>
      <option value="building_lockup">Schedule Building Lockup</option>
      <option value="custom_callings">Update Custom Calling(s)</option>
    </select>

    <p id="usageNote" class="access-note">Select a Ward, Building and choose your Request.</p>

    <div id="requestContent" class="hidden">

    <div id="nameEmailFields">
      <label for="name">Name</label>
      <input id="name" type="text" name="name" maxlength="100" autocomplete="name">

      <label for="email">Email</label>
      <input id="email" type="email" name="email" maxlength="254" placeholder="Enter your church email" autocomplete="email">
    </div>

    <div id="temporaryFields">
      <label for="startDate">Start Date</label>
      <input id="startDate" type="date" name="startDate">

      <label for="startTime">Start Time</label>
      <select id="startTime" name="startTime">
        <option value="">-- Select Time --</option>
      </select>

      <label for="endDate">End Date</label>
      <input id="endDate" type="date" name="endDate">

      <label for="endTime">End Time</label>
      <select id="endTime" name="endTime">
        <option value="">-- Select Time --</option>
      </select>

      <label for="purpose">Purpose</label>
      <input id="purpose" type="text" name="purpose" maxlength="150">
    </div>

    <div id="lockupFields" class="hidden">
      <label for="bulkChanges">Information</label>
      <p id="bulkHint" class="field-hint"></p>
      <textarea id="bulkChanges" name="bulkChanges" rows="5"></textarea>
    </div>

    <p class="access-note">Access granted within 24 hours.</p>
    <div class="btn-row">
      <button type="submit" class="submit-btn">Submit Request</button>
      <button type="button" class="cancel-btn" onclick="confirmCancel()">Cancel</button>
    </div>

    </div>
    <div id="message" role="status" aria-live="polite" aria-atomic="true"></div>
  </form>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
