<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copperview Stake — Temporary Building Access</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --text: #e0e0e0;
      --input-bg: #2d2d2d;
      --input-border: #555;
      --heading: #fff;
      --btn-bg: #4285f4;
      --btn-hover: #3367d6;
    }
    .light {
      --bg: #fff;
      --text: #333;
      --input-bg: #fff;
      --input-border: #ccc;
      --heading: #333;
      --btn-bg: #4285f4;
      --btn-hover: #3367d6;
    }
    * { box-sizing: border-box; }
    html { font-size: 22px; }
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 15px; background: var(--bg); color: var(--text); font-size: 1rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .header h2 { color: var(--heading); margin: 0; font-size: 1.4rem; }
    .header button { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 0; color: var(--text); }
    .header button:hover { opacity: 0.7; }
    label { display: block; margin-top: 16px; font-weight: bold; font-size: 1rem; }
    input, select, textarea {
      width: 100%;
      padding: 16px;
      margin-top: 6px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 1rem;
      -webkit-appearance: none;
    }
    input[type="date"], input[type="time"] {
      text-align: left;
      min-height: 54px;
      line-height: 1.2;
    }
    input[type="date"]::-webkit-date-and-time-value,
    input[type="time"]::-webkit-date-and-time-value {
      text-align: left;
    }
    select { padding: 16px 10px; }
    input::placeholder, textarea::placeholder { color: #888; font-size: 1rem; }
    .btn-row { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
    .submit-btn {
      padding: 18px 20px;
      background: var(--btn-bg);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      width: 100%;
    }
    .submit-btn:hover { background: var(--btn-hover); }
    .cancel-btn {
      padding: 18px 20px;
      background: #888;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      width: 100%;
    }
    .cancel-btn:hover { background: #666; }
    #message { margin-top: 15px; font-weight: bold; text-align: center; font-size: 1rem; }
  </style>
</head>
<body class="light">
  <div class="header">
    <h2>Copperview Stake<br><span style="font-size:0.85em">Temporary Building Access</span></h2>
    <button type="button" id="modeToggle" onclick="toggleMode()">&#9789;</button>
  </div>
  <form id="licenseForm">
    <label>Ward</label>
    <select name="ward" required onchange="autoSelectBuilding(this.value)">
      <option value="">-- Select Ward --</option>
      <option>1st Ward</option>
      <option>2nd Ward</option>
      <option>3rd Ward</option>
      <option>4th Ward</option>
      <option>5th Ward</option>
      <option>6th Ward</option>
      <option>7th Ward</option>
      <option>8th Ward</option>
      <option>9th Ward</option>
    </select>

    <label>Building</label>
    <select name="building" required>
      <option value="">-- Select Building --</option>
      <option>3200 Building</option>
      <option>2700 Building</option>
      <option>Stake Center</option>
    </select>

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Purpose</label>
    <input type="text" name="purpose" placeholder="Optional">

    <label>Start Date</label>
    <input type="date" name="startDate" required onchange="if(!this.form.startTime.value) this.form.startTime.value='10:00'">

    <label>Start Time</label>
    <input type="time" name="startTime" required>

    <label>End Date</label>
    <input type="date" name="endDate" required onchange="if(!this.form.endTime.value) this.form.endTime.value='22:00'">

    <label>End Time</label>
    <input type="time" name="endTime" required>

    <label>Notes</label>
    <textarea name="notes" rows="3" placeholder="Optional"></textarea>

    <div class="btn-row">
      <button type="submit" class="submit-btn">Submit Request</button>
      <button type="button" class="cancel-btn" onclick="document.getElementById('licenseForm').reset(); document.getElementById('message').textContent='';">Cancel</button>
    </div>
  </form>
  <div id="message"></div>

  <script>
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFkhiIYgxUqWKyyAwSKcW864MLgczgh_DhDYTtDQKU91tFxVwWSBmPLUDz-B2kWD2O/exec';

    function autoSelectBuilding(ward) {
      var building = document.querySelector('select[name="building"]');
      var map = {
        "1st Ward": "2700 Building",
        "2nd Ward": "2700 Building",
        "3rd Ward": "2700 Building",
        "4th Ward": "3200 Building",
        "6th Ward": "3200 Building",
        "7th Ward": "3200 Building"
      };
      building.value = map[ward] || "Stake Center";
    }

    function toggleMode() {
      document.body.classList.toggle('light');
      var btn = document.getElementById('modeToggle');
      btn.innerHTML = document.body.classList.contains('light') ? '&#9789;' : '&#9728;';
    }

    document.getElementById('licenseForm').addEventListener('submit', function(ev) {
      ev.preventDefault();
      var form = ev.target;
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var startDate = new Date(form.startDate.value);
      var endDate = new Date(form.endDate.value);

      if (startDate < today) {
        document.getElementById('message').style.color = '#f44336';
        document.getElementById('message').textContent = 'Start date cannot be in the past.';
        return;
      }
      if (endDate < today) {
        document.getElementById('message').style.color = '#f44336';
        document.getElementById('message').textContent = 'End date cannot be in the past.';
        return;
      }
      if (endDate < startDate) {
        document.getElementById('message').style.color = '#f44336';
        document.getElementById('message').textContent = 'End date cannot be before start date.';
        return;
      }

      var data = {
        ward: form.ward.value,
        building: form.building.value,
        name: form.name.value,
        email: form.email.value,
        purpose: form.purpose.value,
        startDate: form.startDate.value,
        startTime: form.startTime.value,
        endDate: form.endDate.value,
        endTime: form.endTime.value,
        notes: form.notes.value
      };

      document.getElementById('message').textContent = 'Submitting...';
      document.getElementById('message').style.color = '#4caf50';

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(JSON.stringify(data))
      })
      .then(function() {
        document.getElementById('message').style.color = '#4caf50';
        document.getElementById('message').textContent = 'Request submitted successfully!';
        form.reset();
      })
      .catch(function(err) {
        document.getElementById('message').style.color = '#f44336';
        document.getElementById('message').textContent = 'Error: ' + err.message;
      });
    });
  </script>
</body>
</html>
