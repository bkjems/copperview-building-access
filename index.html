<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temporary Building Access</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="light">
  <div class="header">
    <h2><span id="stakeName"></span><br><span style="font-size:0.7em; white-space:nowrap">Temporary Building Access</span></h2>
    <button type="button" id="modeToggle" onclick="toggleMode()">&#9789;</button>
  </div>
  <form id="licenseForm">
    <label>Ward</label>
    <select name="ward" required onchange="autoSelectBuilding(this.value)">
      <option value="">-- Select Ward --</option>
    </select>

    <label>Building</label>
    <select name="building" required>
      <option value="">-- Select Building --</option>
    </select>

    <label>Name</label>
    <input type="text" name="name" required maxlength="100">

    <label>Email</label>
    <input type="email" name="email" required maxlength="254">

    <label>Start Date</label>
    <input type="date" name="startDate" required onchange="onStartDateChange(this.form)">

    <label>Start Time</label>
    <select name="startTime" required>
      <option value="">-- Select Time --</option>
    </select>

    <label>End Date</label>
    <input type="date" name="endDate" required onchange="onEndDateChange(this.form)">

    <label>End Time</label>
    <select name="endTime" required>
      <option value="">-- Select Time --</option>
    </select>

    <label>Purpose</label>
    <textarea name="purpose" rows="3" placeholder="Optional" maxlength="500"></textarea>

    <div id="message"></div>
    <div class="btn-row">
      <button type="submit" class="submit-btn">Submit Request</button>
      <button type="button" class="cancel-btn" onclick="confirmCancel()">Cancel</button>
    </div>
  </form>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
