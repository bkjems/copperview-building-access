<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unit Tests — Building Access Form</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 20px auto; padding: 0 15px; }
    .pass { color: green; }
    .fail { color: red; }
    h2 { margin-top: 24px; }
    #summary { font-size: 1.2em; font-weight: bold; margin: 20px 0; padding: 10px; border: 2px solid; }
    #summary.all-pass { border-color: green; color: green; }
    #summary.has-fail { border-color: red; color: red; }
  </style>
</head>
<body class="light">
  <h1>Unit Tests</h1>
  <div id="summary"></div>
  <div id="results"></div>

  <!-- Hidden form that mirrors index.html structure -->
  <div style="display:none">
    <div id="stakeName"></div>
    <form id="licenseForm">
      <select name="ward"><option value="">-- Select Ward --</option></select>
      <select name="building"><option value="">-- Select Building --</option></select>
      <input type="text" name="name" required maxlength="100">
      <input type="email" name="email" required maxlength="254">
      <input type="date" name="startDate" required>
      <select name="startTime" required><option value="">-- Select Time --</option></select>
      <input type="date" name="endDate" required>
      <select name="endTime" required><option value="">-- Select Time --</option></select>
      <input type="text" name="purpose" maxlength="150">
      <div id="message"></div>
      <button type="submit" class="submit-btn">Submit Request</button>
    </form>
    <button id="modeToggle"></button>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    var passed = 0;
    var failed = 0;
    var results = document.getElementById('results');

    function log(name, pass, detail) {
      var div = document.createElement('div');
      div.className = pass ? 'pass' : 'fail';
      div.textContent = (pass ? 'PASS' : 'FAIL') + ': ' + name + (detail ? ' — ' + detail : '');
      results.appendChild(div);
      if (pass) passed++; else failed++;
    }

    function section(title) {
      var h2 = document.createElement('h2');
      h2.textContent = title;
      results.appendChild(h2);
    }

    // ── Ward-Building Map ──
    section('Ward-Building Map');

    log('wardBuildingMap has all wards', Object.keys(wardBuildingMap).length === 9);

    log('1st Ward maps to 2700 Building', wardBuildingMap['1st Ward'] === '2700 Building');
    log('4th Ward maps to 3200 Building', wardBuildingMap['4th Ward'] === '3200 Building');
    log('5th Ward maps to Stake Center', wardBuildingMap['5th Ward'] === 'Stake Center');
    log('9th Ward maps to Stake Center', wardBuildingMap['9th Ward'] === 'Stake Center');

    // ── autoSelectBuilding ──
    section('Auto-Select Building');

    var buildingSelect = document.querySelector('select[name="building"]');
    autoSelectBuilding('1st Ward');
    log('Selecting 1st Ward sets building to 2700 Building', buildingSelect.value === '2700 Building');

    autoSelectBuilding('8th Ward');
    log('Selecting 8th Ward sets building to Stake Center', buildingSelect.value === 'Stake Center');

    autoSelectBuilding('');
    log('Empty ward clears building', buildingSelect.value === '');

    // ── Ward Dropdown Population ──
    section('Dropdown Population');

    var wardSelect = document.querySelector('select[name="ward"]');
    log('Ward dropdown has 10 options (9 wards + placeholder)', wardSelect.options.length === 10);
    log('First ward option is placeholder', wardSelect.options[0].value === '');
    log('Second option is 1st Ward', wardSelect.options[1].value === '1st Ward');

    var buildingOpts = document.querySelector('select[name="building"]');
    log('Building dropdown has 4 options (3 buildings + placeholder)', buildingOpts.options.length === 4);

    // ── Time Dropdown Population ──
    section('Time Dropdown Population');

    var startTimeSelect = document.querySelector('select[name="startTime"]');
    var endTimeSelect = document.querySelector('select[name="endTime"]');
    // 6:00 AM to 11:30 PM = 18 hours * 2 slots = 36 + 1 placeholder = 37
    log('Start time has 37 options', startTimeSelect.options.length === 37,
      'got ' + startTimeSelect.options.length);
    log('End time has 37 options', endTimeSelect.options.length === 37);
    log('First time option is placeholder', startTimeSelect.options[0].value === '');
    log('Second time option is 6:00 AM', startTimeSelect.options[1].value === '6:00 AM');
    log('Last time option is 11:30 PM', startTimeSelect.options[startTimeSelect.options.length - 1].value === '11:30 PM');

    // Check noon label
    var noonOption = null;
    for (var i = 0; i < startTimeSelect.options.length; i++) {
      if (startTimeSelect.options[i].value === '12:00 PM') {
        noonOption = startTimeSelect.options[i];
        break;
      }
    }
    log('12:00 PM displays as "12:00 PM (Noon)"', noonOption && noonOption.textContent === '12:00 PM (Noon)');

    // ── Title Population ──
    section('Title Population');

    log('Stake name populated', document.getElementById('stakeName').textContent === 'Copperview Stake');
    log('Page title set', document.title === 'Copperview Stake — Temporary Building Access');

    // ── Min Date ──
    section('Min Date');

    var todayStr = new Date().toISOString().split('T')[0];
    var startDateInput = document.querySelector('input[name="startDate"]');
    var endDateInput = document.querySelector('input[name="endDate"]');
    log('Start date min is today', startDateInput.min === todayStr);
    log('End date min is today', endDateInput.min === todayStr);

    // ── Input Maxlength ──
    section('Input Maxlength');

    log('Name maxlength is 100', document.querySelector('input[name="name"]').maxLength === 100);
    log('Email maxlength is 254', document.querySelector('input[name="email"]').maxLength === 254);
    log('Purpose maxlength is 150', document.querySelector('input[name="purpose"]').maxLength === 150);

    // ── Time Parsing (toMinutes) ──
    section('Time Parsing');

    // Recreate toMinutes for testing
    var toMinutes = function(t) {
      var parts = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
      var h = parseInt(parts[1]);
      var m = parseInt(parts[2]);
      if (parts[3].toUpperCase() === 'PM' && h !== 12) h += 12;
      if (parts[3].toUpperCase() === 'AM' && h === 12) h = 0;
      return h * 60 + m;
    };

    log('6:00 AM = 360 minutes', toMinutes('6:00 AM') === 360);
    log('12:00 AM = 0 minutes (midnight)', toMinutes('12:00 AM') === 0);
    log('12:00 PM = 720 minutes (noon)', toMinutes('12:00 PM') === 720);
    log('1:00 PM = 780 minutes', toMinutes('1:00 PM') === 780);
    log('11:30 PM = 1410 minutes', toMinutes('11:30 PM') === 1410);
    log('8:00 AM = 480 minutes', toMinutes('8:00 AM') === 480);
    log('10:00 PM = 1320 minutes', toMinutes('10:00 PM') === 1320);
    log('8:00 AM < 10:00 PM', toMinutes('8:00 AM') < toMinutes('10:00 PM'));
    log('10:00 PM > 8:00 AM', toMinutes('10:00 PM') > toMinutes('8:00 AM'));

    // ── Dark/Light Mode Toggle ──
    section('Dark/Light Mode Toggle');

    var body = document.body;
    var modeBtn = document.getElementById('modeToggle');

    // Start state
    var startedLight = body.classList.contains('light');

    toggleMode();
    var afterFirstToggle = body.classList.contains('light');
    log('Toggle removes light class', startedLight && !afterFirstToggle);

    toggleMode();
    var afterSecondToggle = body.classList.contains('light');
    log('Toggle adds light class back', afterSecondToggle);

    // ── Date Validation Logic ──
    section('Date Validation');

    var today = new Date();
    today.setHours(0, 0, 0, 0);

    var yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    log('Yesterday is before today', yesterday < today);

    var tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    log('Tomorrow is not before today', !(tomorrow < today));

    var startDate = new Date(2026, 2, 28); // March 28
    var endDate = new Date(2026, 2, 25);   // March 25
    log('End before start detected', endDate < startDate);

    var sameStart = new Date(2026, 2, 28);
    var sameEnd = new Date(2026, 2, 28);
    log('Same day detected', sameStart.getTime() === sameEnd.getTime());

    // ── confirmCancel ──
    section('Cancel Confirmation');

    var form = document.getElementById('licenseForm');
    form.name.value = '';
    form.email.value = '';
    form.purpose.value = '';
    form.startDate.value = '';
    form.endDate.value = '';

    // Empty form should reset without confirm
    var originalConfirm = window.confirm;
    var confirmCalled = false;
    window.confirm = function() { confirmCalled = true; return false; };
    confirmCancel();
    log('Empty form does not trigger confirm dialog', !confirmCalled);

    // Form with data should trigger confirm
    form.name.value = 'Test';
    confirmCalled = false;
    confirmCancel();
    log('Form with data triggers confirm dialog', confirmCalled);

    window.confirm = originalConfirm;
    form.name.value = '';

    // ── Submit Button Disable ──
    section('Submit Button');

    var submitBtn = form.querySelector('.submit-btn');
    log('Submit button exists', !!submitBtn);
    log('Submit button starts enabled', !submitBtn.disabled);
    log('Submit button text is "Submit Request"', submitBtn.textContent === 'Submit Request');

    // ── Summary ──
    var summary = document.getElementById('summary');
    summary.textContent = passed + ' passed, ' + failed + ' failed';
    summary.className = failed === 0 ? 'all-pass' : 'has-fail';
  </script>
</body>
</html>
